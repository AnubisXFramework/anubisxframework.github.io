<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="100%" height="100%" role="img" aria-label="Cognitive Centroid Theory">
<defs>
  <marker id="arrow-right" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6" fill="#999" stroke="none"/>
  </marker>
  <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
  </filter>
  <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="var(--bg-top, #0D0D14)"/>
    <stop offset="100%" stop-color="var(--bg-bottom, #0A0A0F)"/>
  </linearGradient>
  <style>
    .title { font-family: Georgia, 'Times New Roman', serif; font-size: 20px; font-weight: 700; fill: #D4AF37; }
    .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; fill: #999; }
    .eq { font-family: 'Times New Roman', Times, serif; font-size: 18px; fill: #E8E8F0; font-style: italic; }
    .eq-label { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 11px; fill: #999; }
    .axis-label { font-family: 'Times New Roman', Times, serif; font-size: 12px; fill: #666; font-style: italic; }
    .point-label { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 9px; fill: #999; }
    .annotation { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 10px; fill: #888; }
    .def-title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 600; fill: #D4AF37; }
    .def-text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 10px; fill: #999; }
    @media (prefers-color-scheme: light) {
      .eq { fill: #222; }
      .eq-label { fill: #666; }
      .def-text { fill: #666; }
      .point-label { fill: #666; }
    }
  </style>
</defs>

<!-- Background -->
<rect width="700" height="500" fill="url(#bg-grad)" rx="6"/>

<!-- Title -->
<text x="350" y="32" text-anchor="middle" class="title">Cognitive Centroid Theory</text>
<text x="350" y="54" text-anchor="middle" class="subtitle">Behavioral Identity as Asymptotic Attractor in High-Dimensional Feature Space</text>

<!-- Feature space visualization -->
<g transform="translate(40, 85)">
  <!-- Coordinate axes -->
  <line x1="0" y1="320" x2="380" y2="320" stroke="#444" stroke-width="1.2"/>
  <line x1="50" y1="0" x2="50" y2="320" stroke="#444" stroke-width="1.2"/>
  <polygon points="380,320 372,314 372,326" fill="#666"/>
  <polygon points="50,0 44,8 56,8" fill="#666"/>
  <text x="385" y="318" class="axis-label">x</text>
  <text x="34" y="10" class="axis-label">y</text>
  <text x="50" y="340" text-anchor="middle" class="axis-label">Feature 1</text>
  <text x="12" y="160" text-anchor="middle" class="axis-label" transform="rotate(-90,12,160)">Feature 2</text>

  <!-- Confidence ellipses (convergence) -->
  <ellipse cx="220" cy="180" rx="120" ry="80" fill="none" stroke="rgba(0,188,212,0.15)" stroke-width="1" stroke-dasharray="4,3"/>
  <ellipse cx="220" cy="180" rx="80" ry="55" fill="none" stroke="rgba(0,188,212,0.25)" stroke-width="1" stroke-dasharray="4,3"/>
  <ellipse cx="220" cy="180" rx="50" ry="35" fill="none" stroke="rgba(0,188,212,0.4)" stroke-width="1" stroke-dasharray="4,3"/>
  <ellipse cx="220" cy="180" rx="25" ry="18" fill="none" stroke="rgba(0,188,212,0.6)" stroke-width="1.2"/>

  <!-- Centroid point -->
  <circle cx="220" cy="180" r="6" fill="#D4AF37" filter="url(#shadow)"/>
  <circle cx="220" cy="180" r="10" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.4"/>

  <!-- Behavioral observations (scatter points) -->
  <circle cx="120" cy="230" r="3" fill="rgba(0,188,212,0.6)"/>
  <circle cx="160" cy="140" r="3" fill="rgba(0,188,212,0.6)"/>
  <circle cx="180" cy="210" r="3" fill="rgba(0,188,212,0.6)"/>
  <circle cx="200" cy="160" r="3" fill="rgba(0,188,212,0.6)"/>
  <circle cx="230" cy="200" r="3" fill="rgba(0,188,212,0.6)"/>
  <circle cx="250" cy="150" r="3" fill="rgba(0,188,212,0.6)"/>
  <circle cx="270" cy="190" r="3" fill="rgba(0,188,212,0.6)"/>
  <circle cx="140" cy="180" r="3" fill="rgba(0,188,212,0.6)"/>
  <circle cx="290" cy="170" r="3" fill="rgba(0,188,212,0.6)"/>
  <circle cx="170" cy="160" r="3" fill="rgba(0,188,212,0.6)"/>
  <circle cx="260" cy="210" r="3" fill="rgba(0,188,212,0.6)"/>
  <circle cx="150" cy="200" r="3" fill="rgba(0,188,212,0.6)"/>

  <!-- Convergence path arrows -->
  <path d="M125,225 Q170,195 215,183" fill="none" stroke="rgba(212,175,55,0.3)" stroke-width="1" marker-end="url(#arrow-right)"/>
  <path d="M290,170 Q260,172 230,178" fill="none" stroke="rgba(212,175,55,0.3)" stroke-width="1"/>

  <!-- Labels -->
  <text x="220" y="170" text-anchor="middle" class="point-label" fill="#D4AF37">C</text>
  <text x="125" y="245" class="point-label">B(t₁)</text>
  <text x="290" y="167" class="point-label">B(tₙ)</text>
  <text x="260" y="220" class="annotation">Observations</text>
  <text x="300" y="140" class="annotation">Convergence</text>
</g>

<!-- Mathematical definition panel -->
<g transform="translate(450, 85)">
  <rect x="0" y="0" width="230" height="160" fill="rgba(212,175,55,0.04)" stroke="rgba(212,175,55,0.3)" stroke-width="1" rx="4"/>
  <text x="115" y="22" text-anchor="middle" class="def-title">Centroid Definition</text>
  
  <!-- Equation -->
  <text x="115" y="52" text-anchor="middle" class="eq">C = lim_{n→∞} S̄ₙ</text>
  
  <!-- Definition components -->
  <line x1="15" y1="65" x2="215" y2="65" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  
  <text x="115" y="85" text-anchor="middle" class="def-text">where</text>
  
  <text x="15" y="105" class="eq" font-size="14">S̄ₙ = (1/n) Σ_{k=1}^{n} B(t_k)</text>
  <text x="115" y="125" text-anchor="middle" class="def-text">sample mean of behavioral vectors</text>
  
  <text x="115" y="148" text-anchor="middle" class="def-text">lim_{n→∞} S̄ₙ → C (almost surely)</text>
</g>

<!-- Key properties panel -->
<g transform="translate(450, 265)">
  <rect x="0" y="0" width="230" height="195" fill="rgba(0,188,212,0.04)" stroke="rgba(0,188,212,0.3)" stroke-width="1" rx="4"/>
  <text x="115" y="22" text-anchor="middle" class="def-title">Properties</text>
  <line x1="15" y1="32" x2="215" y2="32" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  
  <circle cx="25" cy="52" r="3" fill="#00BCD4"/>
  <text x="35" y="56" class="def-text">Asymptotic convergence</text>
  
  <circle cx="25" cy="76" r="3" fill="#00BCD4"/>
  <text x="35" y="80" class="def-text">Strong law of large numbers</text>
  
  <circle cx="25" cy="100" r="3" fill="#00BCD4"/>
  <text x="35" y="104" class="def-text">Person-specific attractor</text>
  
  <circle cx="25" cy="124" r="3" fill="#00BCD4"/>
  <text x="35" y="128" class="def-text">Dimensionality: 372 features</text>
  
  <circle cx="25" cy="148" r="3" fill="#00BCD4"/>
  <text x="35" y="152" class="def-text">Empirical consistency: 100%</text>
  
  <circle cx="25" cy="172" r="3" fill="#00BCD4"/>
  <text x="35" y="176" class="def-text">Convergence rate: O(1/√n)</text>
</g>

</svg>