<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300" role="img" aria-label="Cognitive Centroid Convergence">
<defs>
<style>.title{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#d4af37;font-weight:600}.label{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#c0c0c0}.math{font-family:serif;font-size:14px;fill:#00d4ff}.highlight{font-family:Arial,Helvetica,sans-serif;font-size:9px;fill:#fffff8}</style>
</defs>
<rect x="20" y="20" width="460" height="260" fill="none" stroke="#2c2c3a" stroke-width="1" rx="8"/>
<text x="250" y="15" text-anchor="middle" class="title">Cognitive Centroid Theory</text>
<text x="250" y="35" text-anchor="middle" class="label">Behavioral Identity as Asymptotic Attractor in Feature Space</text>
<path d="M50 250 C150 80 350 80 450 250" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
<circle cx="250" cy="180" r="8" fill="#d4af37"/>
<circle cx="80" cy="200" r="3" fill="#00d4ff"/><circle cx="140" cy="120" r="3" fill="#00d4ff"/><circle cx="220" cy="90" r="3" fill="#00d4ff"/>
<circle cx="280" cy="110" r="3" fill="#00d4ff"/><circle cx="360" cy="170" r="3" fill="#00d4ff"/><circle cx="420" cy="230" r="3" fill="#00d4ff"/>
<path d="M70 200 L140 120 L220 90 L280 110 L360 170 L420 230" fill="none" stroke="#00d4ff" stroke-width="1"/>
<text x="250" y="285" text-anchor="middle" class="math">C = lim_{n→∞} (1/n) Σ_{k=1}^{n} B(t_k)</text>
<rect x="295" y="170" width="70" height="20" fill="#1a1a2e" stroke="#d4af37" stroke-width="1" rx="3"/><text x="330" y="184" text-anchor="middle" class="highlight">Centroid</text>
<rect x="220" y="220" width="90" height="16" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1" rx="2"/><text x="265" y="232" text-anchor="middle" font-family="Arial" font-size="8" fill="#00d4ff">Convergence Path</text>
</svg>
