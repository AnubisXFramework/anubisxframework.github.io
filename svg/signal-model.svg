<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="100%" height="100%" role="img" aria-label="Behavioral Signal Model">
<defs>
  <marker id="arrow-right" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6" fill="#999" stroke="none"/>
  </marker>
  <marker id="arrow-down-sm" markerWidth="5" markerHeight="5" refX="2.5" refY="5" orient="auto">
    <path d="M0,0 L2.5,5 L5,0" fill="#999" stroke="none"/>
  </marker>
  <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
  </filter>
  <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="var(--bg-top, #0D0D14)"/>
    <stop offset="100%" stop-color="var(--bg-bottom, #0A0A0F)"/>
  </linearGradient>
  <style>
    .title { font-family: Georgia, 'Times New Roman', serif; font-size: 20px; font-weight: 700; fill: #D4AF37; }
    .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; fill: #999; }
    .eq { font-family: 'Times New Roman', Times, serif; font-size: 20px; fill: #E8E8F0; font-style: italic; }
    .eq-main { font-family: 'Times New Roman', Times, serif; font-size: 22px; fill: #E8E8F0; font-style: italic; }
    .component-name { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #E8E8F0; }
    .component-desc { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 10px; fill: #999; }
    .component-sym { font-family: 'Times New Roman', Times, serif; font-size: 16px; fill: #E8E8F0; font-style: italic; }
    .annotation { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 10px; fill: #888; }
    @media (prefers-color-scheme: light) {
      .eq { fill: #222; }
      .eq-main { fill: #222; }
      .component-name { fill: #222; }
      .component-sym { fill: #222; }
    }
  </style>
</defs>

<!-- Background -->
<rect width="800" height="420" fill="url(#bg-grad)" rx="6"/>

<!-- Title -->
<text x="400" y="30" text-anchor="middle" class="title">Behavioral Signal Model</text>
<text x="400" y="52" text-anchor="middle" class="subtitle">Decomposition of Observed Digital Behavior into Constituent Components</text>

<!-- Main equation -->
<g transform="translate(50, 80)">
  <text x="350" y="0" text-anchor="middle" class="eq-main">y(t, c, p) = y_cog(t) + y_ctx(c) + y_plat(p) + ε(t, c, p)</text>
  <text x="350" y="22" text-anchor="middle" class="annotation">Observed behavioral signal as additive decomposition over time, context, and platform</text>
</g>

<!-- Component decomposition blocks -->
<!-- Cognitive -->
<g transform="translate(55, 130)">
  <rect x="0" y="0" width="155" height="130" fill="rgba(21,101,192,0.06)" stroke="#1565C0" stroke-width="1.2" rx="4" filter="url(#shadow)"/>
  <rect x="0" y="0" width="4" height="130" fill="#1565C0" rx="2"/>
  <text x="78" y="24" text-anchor="middle" class="component-name">Cognitive Core</text>
  <text x="78" y="42" text-anchor="middle" class="component-sym" fill="#1565C0">y_cog(t)</text>
  <text x="78" y="62" text-anchor="middle" class="component-desc">Person-specific behavioral</text>
  <text x="78" y="76" text-anchor="middle" class="component-desc">signature invariant across</text>
  <text x="78" y="90" text-anchor="middle" class="component-desc">contexts and platforms</text>
  <text x="78" y="112" text-anchor="middle" class="annotation" fill="#1565C0">Identity signal</text>
</g>

<!-- Plus sign -->
<text x="225" y="195" class="eq" text-anchor="middle" font-size="24">+</text>

<!-- Contextual -->
<g transform="translate(240, 130)">
  <rect x="0" y="0" width="155" height="130" fill="rgba(123,31,162,0.06)" stroke="#7B1FA2" stroke-width="1.2" rx="4" filter="url(#shadow)"/>
  <rect x="0" y="0" width="4" height="130" fill="#7B1FA2" rx="2"/>
  <text x="78" y="24" text-anchor="middle" class="component-name">Contextual</text>
  <text x="78" y="42" text-anchor="middle" class="component-sym" fill="#7B1FA2">y_ctx(c)</text>
  <text x="78" y="62" text-anchor="middle" class="component-desc">Situation-dependent</text>
  <text x="78" y="76" text-anchor="middle" class="component-desc">behavioral variation</text>
  <text x="78" y="90" text-anchor="middle" class="component-desc">across environments</text>
  <text x="78" y="112" text-anchor="middle" class="annotation" fill="#7B1FA2">Contextual drift</text>
</g>

<!-- Plus sign -->
<text x="410" y="195" class="eq" text-anchor="middle" font-size="24">+</text>

<!-- Platform -->
<g transform="translate(425, 130)">
  <rect x="0" y="0" width="155" height="130" fill="rgba(0,188,212,0.06)" stroke="#00BCD4" stroke-width="1.2" rx="4" filter="url(#shadow)"/>
  <rect x="0" y="0" width="4" height="130" fill="#00BCD4" rx="2"/>
  <text x="78" y="24" text-anchor="middle" class="component-name">Platform</text>
  <text x="78" y="42" text-anchor="middle" class="component-sym" fill="#00BCD4">y_plat(p)</text>
  <text x="78" y="62" text-anchor="middle" class="component-desc">Platform-specific signal</text>
  <text x="78" y="76" text-anchor="middle" class="component-desc">from API constraints,</text>
  <text x="78" y="90" text-anchor="middle" class="component-desc">UI, and affordances</text>
  <text x="78" y="112" text-anchor="middle" class="annotation" fill="#00BCD4">Platform bias</text>
</g>

<!-- Plus sign -->
<text x="595" y="195" class="eq" text-anchor="middle" font-size="24">+</text>

<!-- Noise -->
<g transform="translate(610, 130)">
  <rect x="0" y="0" width="155" height="130" fill="rgba(255,143,0,0.06)" stroke="#FF8F00" stroke-width="1.2" rx="4" filter="url(#shadow)"/>
  <rect x="0" y="0" width="4" height="130" fill="#FF8F00" rx="2"/>
  <text x="78" y="24" text-anchor="middle" class="component-name">Error / Noise</text>
  <text x="78" y="42" text-anchor="middle" class="component-sym" fill="#FF8F00">ε(t, c, p)</text>
  <text x="78" y="62" text-anchor="middle" class="component-desc">Unmodeled residual</text>
  <text x="78" y="76" text-anchor="middle" class="component-desc">variation including</text>
  <text x="78" y="90" text-anchor="middle" class="component-desc">measurement error</text>
  <text x="78" y="112" text-anchor="middle" class="annotation" fill="#FF8F00">Residual noise</text>
</g>

<!-- Explanation footer -->
<g transform="translate(55, 290)">
  <rect x="0" y="0" width="710" height="100" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1" rx="4"/>
  <text x="355" y="22" text-anchor="middle" class="component-name" font-size="12">Model Properties</text>
  
  <circle cx="30" cy="44" r="3" fill="#1565C0"/>
  <text x="42" y="48" class="component-desc">Cognitive component y_cog(t) defines the attractor centroid C in Cognitive Centroid theory</text>
  
  <circle cx="30" cy="64" r="3" fill="#7B1FA2"/>
  <text x="42" y="68" class="component-desc">Contextual component models intra-person variability across tasks and environments</text>
  
  <circle cx="30" cy="84" r="3" fill="#00BCD4"/>
  <text x="42" y="88" class="component-desc">Platform component captures API-mediated behavioral constraints unique to each platform</text>
</g>

</svg>