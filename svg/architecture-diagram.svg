<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" width="800" height="650" role="img" aria-label="Six-Layer Architecture Diagram">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#00d4ff"/></marker>
<style>.label{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#fffff8}.title{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#d4af37;font-weight:600}.desc{font-family:Arial,Helvetica,sans-serif;font-size:11px;fill:#888}</style>
</defs>
<rect x="50" y="40" width="700" height="570" fill="none" stroke="#2c2c3a" stroke-width="1" rx="8"/>
<text x="400" y="25" text-anchor="middle" class="label" font-size="18">AnubisX Framework: Six-Layer Architecture</text>
<text x="400" y="60" text-anchor="middle" class="desc">Behavioral Digital Attribution Processing Pipeline</text>
<g id="external-inputs">
<rect x="60" y="80" width="120" height="50" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1" rx="4"/><text x="120" y="105" text-anchor="middle" class="title">Input Artifacts</text><text x="120" y="120" text-anchor="middle" class="desc">Raw Digital Data</text>
</g>
<g id="layer1">
<rect x="60" y="150" width="700" height="70" fill="#0f0f1a" stroke="#d4af37" stroke-width="2" rx="4"/><text x="70" y="172" class="title">Layer 1 — Data</text><text x="70" y="187" class="label">Ingestion & Validation</text><text x="70" y="202" class="desc">Raw data acquisition • Platform adapters • Data validation</text>
<polygon points="130,130 140,140 130,150" fill="#00d4ff" marker-end="url(#arrow)"/>
</g>
<g id="layer2">
<rect x="60" y="240" width="700" height="70" fill="#0f0f1a" stroke="#d4af37" stroke-width="2" rx="4"/><text x="70" y="262" class="title">Layer 2 — Feature</text><text x="70" y="277" class="label">Feature Extraction</text><text x="70" y="292" class="desc">Modality-specific features • Lexical • Semantic • Temporal</text>
<polygon points="130,220 140,230 130,240" fill="#00d4ff" marker-end="url(#arrow)"/>
</g>
<g id="layer3">
<rect x="60" y="330" width="700" height="70" fill="#0f0f1a" stroke="#d4af37" stroke-width="2" rx="4"/><text x="70" y="352" class="title">Layer 3 — Profile</text><text x="70" y="367" class="label">Profile Construction</text><text x="70" y="382" class="desc">Fingerprint generation • Quality assessment • Storage</text>
<polygon points="130,310 140,320 130,330" fill="#00d4ff" marker-end="url(#arrow)"/>
</g>
<g id="layer4">
<rect x="60" y="420" width="700" height="70" fill="#0f0f1a" stroke="#d4af37" stroke-width="2" rx="4"/><text x="70" y="442" class="title">Layer 4 — Comparison</text><text x="70" y="457" class="label">Similarity Computation</text><text x="70" y="472" class="desc">Distance metrics • Cosine similarity • FAISS search</text>
<polygon points="130,400 140,410 130,420" fill="#00d4ff" marker-end="url(#arrow)"/>
</g>
<g id="layer5">
<rect x="60" y="510" width="700" height="70" fill="#0f0f1a" stroke="#d4af37" stroke-width="2" rx="4"/><text x="70" y="532" class="title">Layer 5 — Evidence</text><text x="70" y="547" class="label">Evidence Evaluation</text><text x="70" y="562" class="desc">Likelihood ratio • Score calibration • Evidence fusion</text>
<polygon points="130,490 140,500 130,510" fill="#00d4ff" marker-end="url(#arrow)"/>
</g>
<g id="layer6">
<rect x="60" y="590" width="700" height="70" fill="#0f0f1a" stroke="#d4af37" stroke-width="2" rx="4"/><text x="70" y="612" class="title">Layer 6 — Decision</text><text x="70" y="627" class="label">Identity Decision</text><text x="70" y="642" class="desc">Threshold-based classification • Confidence quantification • Reporting</text>
<polygon points="130,570 140,580 130,590" fill="#00d4ff" marker-end="url(#arrow)"/>
</g>
<g id="output">
<rect x="60" y="640" width="120" height="50" fill="#1a1a2e" stroke="#50c878" stroke-width="1" rx="4"/><text x="120" y="665" text-anchor="middle" class="title">Output Decision</text><text x="120" y="680" text-anchor="middle" class="desc">Attribution Result</text>
</g>
</svg>
