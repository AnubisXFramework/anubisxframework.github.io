<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200" role="img" aria-label="Likelihood Ratio Framework">
<defs>
<style>.title{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#fffff8}.label{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#c0c0c0}.math{font-family:serif;font-size:16px;fill:#d4af37}</style>
</defs>
<rect x="50" y="30" width="500" height="140" fill="none" stroke="#2c2c3a" stroke-width="1" rx="4"/>
<text x="300" y="20" text-anchor="middle" class="title">Likelihood Ratio Evidence Evaluation</text>
<rect x="60" y="50" width="120" height="50" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1" rx="3"/><text x="120" y="75" text-anchor="middle" class="label">H_same</text><text x="120" y="92" text-anchor="middle" class="label">Same Source</text>
<rect x="220" y="50" width="160" height="50" fill="#0f0f1a" stroke="#d4af37" stroke-width="2" rx="3"/><text x="300" y="75" text-anchor="middle" class="math">LR = P(E|H_same)</text><text x="300" y="92" text-anchor="middle" class="math">/ P(E|H_diff)</text>
<rect x="420" y="50" width="120" height="50" fill="#1a1a2e" stroke="#ffbf00" stroke-width="1" rx="3"/><text x="480" y="75" text-anchor="middle" class="label">H_diff</text><text x="480" y="92" text-anchor="middle" class="label">Different Source</text>
<polygon points="180,75 190,75 190,85 180,85" fill="#00d4ff"/><polygon points="380,75 390,75 390,85 380,85" fill="#00d4ff"/>
<line x1="300" y1="100" x2="300" y2="180" stroke="#00d4ff" stroke-width="1"/><text x="300" y="140" text-anchor="middle" class="label" fill="#00d4ff">Evidence Grades</text>
<rect x="180" y="160" width="80" height="20" fill="#1a1a2e" stroke="#50c878" stroke-width="1" rx="2"/><text x="220" y="174" text-anchor="middle" font-family="Arial" font-size="10" fill="#50c878">LR &gt; 100</text>
<rect x="280" y="160" width="80" height="20" fill="#1a1a2e" stroke="#ffbf00" stroke-width="1" rx="2"/><text x="320" y="174" text-anchor="middle" font-family="Arial" font-size="10" fill="#ffbf00">LR 3-10</text>
<rect x="380" y="160" width="80" height="20" fill="#1a1a2e" stroke="#dc143c" stroke-width="1" rx="2"/><text x="420" y="174" text-anchor="middle" font-family="Arial" font-size="10" fill="#dc143c">LR &lt; 0.1</text>
</svg>
